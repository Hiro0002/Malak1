    <style>
    /* General Layout */
* { 
    margin: 0; 
    padding: 0; 
    box-sizing: border-box; 
    font-family: 'Comic Sans MS', cursive, sans-serif; 
}

body { 
    background: linear-gradient(135deg, #ffb6c1 0%, #fad0c4 100%); 
    height: 100vh; 
    overflow: hidden; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    align-items: center; 
    position: relative; 
}

/* The Glass Box Container */
.container { 
    position: relative; /* Essential to anchor the bear to the top */
    text-align: center; 
    z-index: 10; 
    padding: 100px 2rem 2rem; /* Added top padding so bear doesn't cover text */
    max-width: 800px; 
    background-color: rgba(255, 255, 255, 0.2); 
    border-radius: 20px; 
    backdrop-filter: blur(5px); 
    box-shadow: 0 8px 32px rgba(255, 105, 180, 0.3); 
    transition: all 0.5s ease; 
}

/* The Bear Sitting on Top */
.card-bear {
    position: fixed; 
    top: 23%;
    left: 50%;
    transform: translate(-50%, -180px); 
    width: 250px;
    z-index: 1000;

    /* FIX: This keeps the belly solid white while hiding the background box */
    mix-blend-mode: multiply; 
    background: none;
    
    /* This filter helps clean up any leftover white edges from the image */
    filter: contrast(1.1) brightness(1.05);
    
    /* Force removal of any inherited styles */
    border: none !important;
    padding: 0;
    pointer-events: none;
}

/* Text and Animations */
h1 { 
    font-size: 3.5rem; 
    color: #FF1493; 
    text-shadow: 2px 2px 8px rgba(255, 255, 255, 0.8); 
    margin-bottom: 1.5rem; 
    opacity: 0; 
    animation: bounce-in 1.5s forwards 0.5s; 
}

.subtitle { 
    font-size: 1.8rem; 
    color: #8A2BE2; 
    margin-bottom: 2rem; 
    text-shadow: 1px 1px 4px rgba(255, 255, 255, 0.6); 
    opacity: 0; 
}

.next-button { 
    padding: 1rem 3rem; 
    font-size: 1.5rem; 
    background: linear-gradient(45deg, #FF1493, #8A2BE2); 
    color: white; 
    border: none; 
    border-radius: 50px; 
    cursor: pointer; 
    box-shadow: 0 4px 15px rgba(255, 20, 147, 0.5); 
    transition: all 0.3s ease; 
    opacity: 0; 
    animation: fade-in 1s forwards 3s; 
}

/* Typewriter & Floating elements */
.typewriter-container { display: inline-block; position: relative; overflow: hidden; height: 2.5rem; }
.typewriter-text { white-space: nowrap; overflow: hidden; width: 0; animation: typewriter 3s steps(50) forwards 1.5s; }
.cursor { position: absolute; right: -5px; width: 3px; height: 100%; background-color: #8A2BE2; animation: blink 0.8s infinite; }

@keyframes bounce-in { 0% { transform: scale(0); opacity: 0; } 60% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(1); opacity: 1; } }
@keyframes fade-in { 0% { opacity: 0; transform: translateY(20px); } 100% { opacity: 1; transform: translateY(0); } }
@keyframes typewriter { from { width: 0; } to { width: 100%; } }
@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

/* Corner Photos */
.corner-photo-container { position: fixed; top: 20px; z-index: 9999; }
.right { right: 20px; }
.left { left: 20px; }

.styled-corner-photo {
    width: 80px;
    height: 80px;
    object-fit: cover;
    border-radius: 0; /* REMOVED circular shape */
    border: none;     /* REMOVED white border */
    box-shadow: 0 0 15px rgba(255, 20, 147, 0.5);
    transition: all 0.3s ease;
}

<body>
    <div class="container">
        <h1>Happy Birthday, <br>Maloka <br>😛</h1>
        <div class="typewriter-container">
            <div class="subtitle typewriter-text">
                Hello baby i hope you find this pretty
                <span class="cursor"></span>
            </div>
        </div>
        <button class="next-button" onclick="goToNextPage()">can u mayhaps click me</button>
    </div>

    <div class="audio-controls">
        <button id="play-pause"><i>▶️</i></button>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="0.5">
    </div>

    <audio id="birthday-song" loop autoplay>
    <source src="song.mp3.mp3" type="audio/mp3">
</audio>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js"></script>
    <script>
        const audio = document.getElementById('birthday-song');
        const playPauseBtn = document.getElementById('play-pause');
        const volumeControl = document.getElementById('volume');
        let isPlaying = false;

        // Save audio state before leaving
        function goToNextPage() {
            localStorage.setItem('audioTime', audio.currentTime);
            localStorage.setItem('audioPaused', audio.paused);
            localStorage.setItem('audioVolume', audio.volume);

            gsap.to('.next-button', {
                scale: 1.2, yoyo: true, repeat: 1, duration: 0.3,
                onComplete: () => { window.location.href = "memorylane.html"; }
            });
        }

        // Standard Audio Controls
        playPauseBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playPauseBtn.innerHTML = '<i>⏸️</i>';
            } else {
                audio.pause();
                playPauseBtn.innerHTML = '<i>▶️</i>';
            }
        });

        volumeControl.addEventListener('input', () => { audio.volume = volumeControl.value; });

        // Floating Elements Logic
        function createFloatingElements() {
            const elements = ['🎈', '❤️', '✨', '🌸'];
            for (let i = 0; i < 30; i++) {
                const el = document.createElement('div');
                el.innerHTML = elements[Math.floor(Math.random() * elements.length)];
                el.style.position = 'absolute';
                el.style.left = Math.random() * 100 + 'vw';
                el.style.top = '-50px';
                el.style.fontSize = (Math.random() * 20 + 20) + 'px';
                document.body.appendChild(el);
                gsap.to(el, {
                    y: window.innerHeight + 100,
                    x: '+=' + (Math.random() * 100 - 50),
                    duration: Math.random() * 5 + 5,
                    onComplete: () => el.remove()
                });
            }
        }
        window.addEventListener('load', () => {
            createFloatingElements();
            setInterval(createFloatingElements, 5000);
        });
    </script>

<div class="corner-photo-container">
    <img src="talakkuma.jpg" alt="Birthday Princess" class="styled-corner-photo">
</div>

<div class="corner-photo-container left">
